<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>4 Merge Cloud</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e07820">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="4 Merge Cloud">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #181818; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; position: absolute; top: 0; left: 0; }

    #viewer {
      position: absolute;
      inset: 0;
    }

    #splitDivider {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px; left: 50%;
      background: #aaa;
      pointer-events: none;
      display: none;
      z-index: 5;
    }

    /* ── Panel de controls ── */
    #controls {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 20;
      background: rgba(24, 24, 24, 0.92);
      color: #ddd;
      padding: 8px;
      border: 1px solid #444;
      font-size: 13px;
      border-radius: 8px;
      width: 200px;
      user-select: none;
      max-height: calc(100vh - 20px);
      overflow-y: auto;
    }

    #controls button {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 6px 8px;
      font-size: 12px;
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
    }
    #controls button:hover { background: #484848; }
    #controls button.active { background: #b05a10; border-color: #d07020; color: #fff; }

    #fileInputLabel {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 6px 8px;
      font-size: 12px;
      background: #1a4a7a;
      color: #eee;
      border: 1px solid #2a6aaa;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    #fileInputLabel:hover { background: #2a5a9a; }
    #fileInput { display: none; }

    .sep { border-top: 1px solid #444; margin: 5px 0; }

    /* Llista de núvols carregats */
    #cloudListPanel {
      max-height: 90px;
      overflow-y: auto;
      margin: 3px 0;
      font-size: 11px;
    }
    #cloudListPanel:empty::before {
      content: 'Cap núvol carregat';
      color: #666;
      display: block;
      padding: 2px 4px;
      font-style: italic;
    }
    .cloud-item {
      display: flex;
      align-items: center;
      padding: 2px 4px;
      cursor: pointer;
      border-radius: 3px;
      border: 1px solid transparent;
    }
    .cloud-item:hover { background: #3a3a3a; }
    .cloud-item.selected { background: #5a2800; border-color: #b05a10; }
    .cloud-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cloud-del { color: #f55; cursor: pointer; padding: 0 4px; flex-shrink: 0; font-size: 13px; line-height: 1; }
    .cloud-del:hover { color: #ff8888; }

    /* Transformació numèrica */
    #numericTransform {
      display: none;
      font-size: 11px;
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px;
      margin: 3px 0;
    }
    #numericTransform table { width: 100%; }
    #numericTransform td { padding: 1px 2px; color: #bbb; }
    #numericTransform input[type=number] {
      width: 60px;
      font-size: 11px;
      background: #333;
      color: #eee;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 2px 4px;
    }

    /* ── Mides ── */
    #measureList {
      position: absolute;
      bottom: 55px;
      right: 10px;
      z-index: 20;
      background: rgba(24, 24, 24, 0.92);
      color: #eee;
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      border: 1px solid #555;
      border-radius: 6px;
      max-width: 300px;
      white-space: pre;
      display: none;
    }

    /* Badge alineació */
    #alignBadge {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 140, 80, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Badge càrrega */
    #loadingBadge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 80, 180, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Badge mode mesura */
    #measureBadge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(180, 60, 0, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Barres de vistes ── */
    .view-toolbar {
      position: absolute;
      bottom: 10px;
      display: flex;
      flex-direction: row;
      gap: 5px;
      z-index: 15;
    }
    .view-toolbar.bottom-left { left: 10px; }
    .view-toolbar.bottom-right { right: 10px; }

    .view-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #555;
      background: rgba(30, 30, 30, 0.88);
      color: #ccc;
      padding: 0;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      border-radius: 5px;
      line-height: 1.2;
    }
    .view-btn:hover { background: rgba(70, 70, 70, 0.92); color: #fff; }
    .view-btn.ortho-active { background: rgba(0, 80, 160, 0.9); border-color: #3a8aff; color: #fff; }

    .hidden { display: none !important; }

    /* Etiqueta de visor */
    .viewer-label {
      position: absolute;
      top: 6px;
      font-size: 11px;
      color: #888;
      z-index: 10;
      pointer-events: none;
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 3px;
    }
    #labelA { left: 6px; }
    #labelB { left: calc(50% + 6px); display: none; }
  </style>
</head>
<body>

  <div id="controls">
    <label id="fileInputLabel" for="fileInput">&#128194; Carregar (XYZ / PLY)</label>
    <input type="file" id="fileInput" multiple accept=".xyz,.ply,.txt,text/plain,application/octet-stream">

    <div id="cloudListPanel"></div>

    <div class="sep"></div>
    <button id="btnUndo" disabled style="background:#2a2a2a;color:#888;">&#8617; Desfer</button>

    <div class="sep"></div>
    <button id="modeTranslate">&#8596; Moure núvol</button>
    <button id="modeRotate">&#8635; Rotar núvol</button>

    <button id="toggleNumeric">&#9881; Transformació numèrica</button>
    <div id="numericTransform">
      <table>
        <tr><td>X:</td><td><input id="tx" type="number" step="0.001" value="0"></td></tr>
        <tr><td>Y:</td><td><input id="ty" type="number" step="0.001" value="0"></td></tr>
        <tr><td>Z:</td><td><input id="tz" type="number" step="0.001" value="0"></td></tr>
        <tr><td>Rx°:</td><td><input id="rx" type="number" value="0"></td></tr>
        <tr><td>Ry°:</td><td><input id="ry" type="number" value="0"></td></tr>
        <tr><td>Rz°:</td><td><input id="rz" type="number" value="0"></td></tr>
      </table>
      <button id="applyTransform" style="margin-top:4px">Aplicar</button>
    </div>

    <div class="sep"></div>
    <button id="createClipBox">&#9634; Caixa de tall</button>
    <button id="moveClipBox">&#8596; Moure caixa</button>
    <button id="rotateClipBox">&#8635; Rotar caixa</button>
    <button id="removeClipBox">&#10005; Eliminar caixa</button>

    <div class="sep"></div>
    <button id="align2pt">&#8853; Alinear 2 punts</button>
    <button id="align3pt">&#8853; Alinear 3 punts</button>

    <div class="sep"></div>
    <button id="toggleMeasure">&#128207; Mode mesura</button>
    <button id="clearMeasures">&#128465; Esborrar mides</button>

    <div class="sep"></div>
    <button id="merge">&#8659; Unir i descarregar XYZ</button>
    <button id="btnReset" style="background:#5a1010;border-color:#aa2020;color:#fcc;">&#9851; Reiniciar tot</button>

    <div class="sep"></div>
    <button id="splitView">&#9646;&#9646; Pantalla dividida</button>
    <button id="singleView">&#9646; Vista única</button>
  </div>

  <div id="viewer">
    <div id="splitDivider"></div>
    <div id="labelA" class="viewer-label">Visor A</div>
    <div id="labelB" class="viewer-label">Visor B</div>

    <div id="loadingBadge">&#9203; Carregant fitxer...</div>
    <div id="measureBadge">&#128207; Mode mesura — fes clic en dos punts del núvol</div>
    <div id="alignBadge"></div>

    <div id="measureList"></div>

    <!-- Barra de vistes visor A -->
    <div id="viewToolbarA" class="view-toolbar bottom-left">
      <button id="viewA_3d"    class="view-btn" title="Perspectiva 3D">3D</button>
      <button id="viewA_top"   class="view-btn" title="Planta (des de dalt)">PL</button>
      <button id="viewA_front" class="view-btn" title="Frontal">FR</button>
      <button id="viewA_back"  class="view-btn" title="Posterior">PO</button>
      <button id="viewA_right" class="view-btn" title="Lateral dret">LD</button>
      <button id="viewA_left"  class="view-btn" title="Lateral esquerra">LE</button>
    </div>

    <!-- Barra de vistes visor B -->
    <div id="viewToolbarB" class="view-toolbar bottom-right">
      <button id="viewB_3d"    class="view-btn" title="Perspectiva 3D (B)">3D</button>
      <button id="viewB_top"   class="view-btn" title="Planta (B)">PL</button>
      <button id="viewB_front" class="view-btn" title="Frontal (B)">FR</button>
      <button id="viewB_back"  class="view-btn" title="Posterior (B)">PO</button>
      <button id="viewB_right" class="view-btn" title="Lateral dret (B)">LD</button>
      <button id="viewB_left"  class="view-btn" title="Lateral esquerra (B)">LE</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW no registrat:', err));
      });
    }
  </script>
</body>
</html>
