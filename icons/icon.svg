<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e3a"/>
      <stop offset="100%" style="stop-color:#1a3560"/>
    </linearGradient>
  </defs>
  <!-- Fons -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Punts decoratius (núvol de punts estilitzat) -->
  <g fill="#2a4a80" opacity="0.6">
    <circle cx="80"  cy="180" r="8"/>
    <circle cx="110" cy="155" r="6"/>
    <circle cx="95"  cy="210" r="7"/>
    <circle cx="130" cy="190" r="5"/>
    <circle cx="115" cy="225" r="6"/>
    <circle cx="60"  cy="200" r="5"/>

    <circle cx="390" cy="300" r="8"/>
    <circle cx="420" cy="280" r="6"/>
    <circle cx="405" cy="330" r="7"/>
    <circle cx="440" cy="310" r="5"/>
    <circle cx="430" cy="345" r="6"/>
    <circle cx="370" cy="320" r="5"/>

    <circle cx="200" cy="80"  r="6"/>
    <circle cx="230" cy="65"  r="5"/>
    <circle cx="215" cy="100" r="7"/>
    <circle cx="250" cy="85"  r="5"/>

    <circle cx="300" cy="420" r="6"/>
    <circle cx="330" cy="435" r="5"/>
    <circle cx="315" cy="405" r="7"/>
    <circle cx="345" cy="415" r="5"/>
  </g>

  <!-- Lletres MC -->
  <text x="256" y="305"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="170"
        text-anchor="middle"
        letter-spacing="-6">
    <tspan fill="#e07820">4</tspan><tspan fill="#ffffff">M</tspan><tspan fill="#e07820">C</tspan>
  </text>

  <!-- Línia de mesura decorativa -->
  <line x1="90" y1="370" x2="422" y2="370" stroke="#e07820" stroke-width="4" stroke-dasharray="12,6" opacity="0.7"/>
  <circle cx="90"  cy="370" r="7" fill="#e07820" opacity="0.9"/>
  <circle cx="422" cy="370" r="7" fill="#e07820" opacity="0.9"/>
</svg>
